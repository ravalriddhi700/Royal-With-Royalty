<!DOCTYPE html>

<div class="wrapper">

  {% include 'sleftbar.html' %}
  

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>
        Your Profile
        
      </h1>
      <ol class="breadcrumb">
        <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
        <li class="active">Your Profile</li>
      </ol>
    </section>
    <!-- Content start -->
    <section class="content">
      <div class="row">
        <!-- left column -->
        <div class="col-md-12">
          <!-- general form elements -->
          <div class="box box-primary">
            <div class="box-header with-border">
              <h3 class="box-title"> Your Profile</h3>
            </div>
            <!-- /.box-header -->
            <!-- form start -->
            <form role="form" method="post" enctype="multipart/form-data">
              {% csrf_token %}
              <div class="box-body">
                <div class="form-group">
                  <label for="exampleInputFile">Image</label>
                  <br/>
                        <img src="/media/{{s_data.0.4}}" height="80px" width="80px" style="border-radius: 50% ; border: 3px solid #000;" />
                        <input type="hidden" name="old_img" class="form-control" value="{{s_data.0.4}}" id="exampleInputPassword1" placeholder="Image">
                        <br/>
                  <input type="file" class="form-control" id="exampleInputFile" name="s_image">

                  
                </div>
                <div class="form-group">
                  <label for="exampleInputEmail1"> Name</label>
                  <input type="text" class="form-control" id="exampleInputEmail1" value="{{s_data.0.1}}" placeholder="Enter Name" name="s_name">
                </div>
                
                  
                    <div class="form-group">
                      <label for="exampleInputEmail1">Contact</label>
                      <input type="text" class="form-control" id="exampleInputEmail1" value="{{s_data.0.3}}" placeholder="Enter Contact" name="s_contact" readonly>
                    </div>
                    
                      <div class="form-group">
                        <label for="exampleInputEmail1">Password</label>
                        <input type="text" class="form-control" id="exampleInputEmail1" value="{{s_data.0.5}}" placeholder="Enter password" name="s_password">
                      </div>

                   
                      <div class="form-group">
                        <label for="exampleInputEmail1">Address</label>
                        <textarea class="form-control" id="exampleInputEmail1" placeholder="Enter address" name="s_address">{{s_data.0.2}}</textarea>
                      </div>
                   
              
              <div class="form-group">
                <label>Status</label>
                <select class="form-control" name="s_status">
                  {% if s_data.0.6 == 'Active' %}
                  <option  value="Active" selected>Active</option>
                  <option  value="Deactive">Deactive</option>
                  {% else %}
                  <option  value="Active">Active</option>
                  <option  value="Deactive" selected>Deactive</option>
                  {% endif %}
                </select>
                
              </div>
            </div>
              <!-- /.box-body -->

              <div class="box-footer">
                <button type="submit" class="btn btn-primary">Change</button>
              </div>
            </form>
          </div>
          <!-- /.box -->
        </div>
