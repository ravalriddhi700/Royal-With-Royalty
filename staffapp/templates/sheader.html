{% load static %}
{% if request.session.sname == None %}
<script type="text/javascript">window.location.href="slogin";</script>

{% endif %}
<header class="main-header">
    <!-- Logo -->
    <a href="/staffapp/" class="logo">
      <!-- mini logo for sidebar mini 50x50 pixels -->
      <span class="logo-mini"><b>R</b>L</span>
      <!-- logo for regular state and mobile devices -->
      <span class="logo-lg"><b>Royal With Loaylty </b></span>
    </a>
    <!-- Header Navbar: style can be found in header.less -->
    <nav class="navbar navbar-static-top">
      <!-- Sidebar toggle button-->
      <a href="#" class="sidebar-toggle" data-toggle="push-menu" role="button">
        <span class="sr-only">Toggle navigation</span>
      </a>
     
      <div class="navbar-custom-menu">
        <ul class="nav navbar-nav">
          <li class="dropdown user user-menu" style="
          margin-top: 14px;
          color:white;
      ">
          <span class="">Last Visit : {{request.session.stime}}</span>
         </li>
       
          <!-- User Account: style can be found in dropdown.less -->
          <li class="dropdown user user-menu">
            <a href="#" class="dropdown-toggle" data-toggle="dropdown">
              <img src='/media/{{request.session.simg}}' class="user-image" alt="User Image">
              <span class="hidden-xs">{{request.session.sname}}</span>
            </a>
            <ul class="dropdown-menu">
              <!-- User image -->
              <li class="user-header">
                <img src='/media/{{request.session.simg}}' class="img-circle" alt="User Image">

                <p>
                  {{request.session.sname}}
                  
                </p>
              </li>
              
              <!-- Menu Footer-->
              <li class="user-footer">
                
                <div class="pull-right">
                 
                  <a href="/staffapp/slogout" class="btn btn-default btn-flat">Logout</a>
                </div>
              </li>
            </ul>
          </li>
          <!-- Control Sidebar Toggle Button -->
       
        </ul>
      </div>
    </nav>
  </header>
